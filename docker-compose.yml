services:
  app:
    build: .
    ports:
      - "9001:9001"
    volumes:
      - app-data:/app/data
    env_file: .env
    depends_on:
      - transmission
    restart: unless-stopped

  transmission:
    image: linuxserver/transmission:latest
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    volumes:
      - transmission-config:/config
      - downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
    restart: unless-stopped

volumes:
  app-data:
  transmission-config:
  downloads:

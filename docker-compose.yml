services:
  app:
    build: .
    ports:
      - "9001:9001"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/rss_ripple_dev.db
      - LOG_LEVEL=DEBUG
      - POSTER_CACHE_DIR=/app/data/posters
    command: ["uv", "run", "--no-project", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9001", "--reload"]
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock
        - action: rebuild
          path: frontend
    depends_on:
      - transmission
    restart: unless-stopped

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    volumes:
      - transmission-config:/config
      - ./docker/transmission/custom-cont-init.d:/custom-cont-init.d:ro
      - ./data/downloads:/downloads
      - ./data/watch:/watch
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - PEERPORT=51413
    restart: unless-stopped

volumes:
  transmission-config:

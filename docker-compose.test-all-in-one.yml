# ──────────────────────────────────────────────────────────────────────────────
# RSSRipple integration tests — All-in-One (single node, embedded storage)
#
#   • SQLite database (no external DB service)
#   • MemoryQueue (no Redis dependency)
#   • Single app instance
#
# Usage:
#   docker compose -f docker-compose.test-all-in-one.yml run --rm test-runner
# ──────────────────────────────────────────────────────────────────────────────
services:
  # ── RSSRipple (MemoryQueue + SQLite) ───────────────────────────────────────
  app:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/rss_ripple_test.db
      - QUEUE_BACKEND=memory
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - POSTER_CACHE_DIR=/app/data/posters
    volumes:
      - ./data:/app/data
    depends_on:
      test-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/api/v1/channels', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  # ── Integration test server (RSS feeds + BitTorrent tracker) ───────────────
  test-server:
    build:
      context: .
      dockerfile: tests/integration/Dockerfile
    environment:
      - SERVER_URL=http://test-server:8080
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  # ── Test runner ────────────────────────────────────────────────────────────
  test-runner:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/rss_ripple_test.db
      - TEST_SERVER_URL=http://test-server:8080
      - RSSRIPPLE_URL=http://app:9001
      # Point both URLs at the same MemoryQueue-backed app so parametrized
      # task_queue tests run in "all-in-one" mode without Redis.
      - REDIS_APP_URL=http://app:9001
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - ./tests:/app/tests:ro
    depends_on:
      app:
        condition: service_healthy
      test-server:
        condition: service_healthy
    command:
      - "sh"
      - "-c"
      - "uv sync --frozen && uv run pytest tests/integration/ -v --tb=short -x --ignore=tests/integration/test_e2e.py --ignore=tests/integration/test_torrent_lifecycle.py --ignore=tests/integration/test_fetch_with_real_feed.py"

  # ── Transmission (torrent lifecycle tests only) ────────────────────────────
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    volumes:
      - transmission-test-config:/config
      - ./docker/transmission/custom-cont-init.d:/custom-cont-init.d:ro
      - test-downloads:/downloads
      - test-watch:/watch
    environment:
      - PUID=1000
      - PGID=1000
      - PEERPORT=51413

volumes:
  transmission-test-config:
  test-downloads:
  test-watch:

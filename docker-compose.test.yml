# ==============================================================================
# RSSRipple Integration Tests — Single Node
#
#   • SQLite database (no external DB service)
#   • MemoryQueue (no Redis dependency)
#   • Single app instance
#
# Runs all deterministic integration tests. External metadata search/accuracy
# benchmarks and real-feed tests are excluded from the default compose suite.
#
# Redis-specific job-queue dedup tests in test_task_queue.py are skipped
# automatically when no distinct Redis-backed instance is available.
#
# Usage:
#   rm -rf data/ && mkdir -p data
#   docker compose -f docker-compose.test.yml run --rm test-runner
# ==============================================================================
services:
  # ── RSSRipple (MemoryQueue + SQLite) ───────────────────────────────────────
  app:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/rss_ripple_test.db
      - QUEUE_BACKEND=memory
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - POSTER_CACHE_DIR=/app/data/posters
      - SCHEDULER_ENABLED=false
    volumes:
      - ./data:/app/data
    depends_on:
      test-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/api/v1/channels', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  # ── Integration test server (RSS feeds + BitTorrent tracker) ───────────────
  test-server:
    build:
      context: .
      dockerfile: tests/integration/Dockerfile
    environment:
      - SERVER_URL=http://test-server:8080
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  # ── Test runner ────────────────────────────────────────────────────────────
  test-runner:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/rss_ripple_test.db
      - TEST_SERVER_URL=http://test-server:8080
      - RSSRIPPLE_URL=http://app:9001
      # REDIS_APP_URL intentionally omitted — test_task_queue.py runs
      # MemoryQueue-only mode and skips Redis-specific dedup tests.
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - ./tests:/app/tests:ro
    depends_on:
      app:
        condition: service_healthy
      test-server:
        condition: service_healthy
    command:
      - "sh"
      - "-c"
      - "uv sync --frozen && uv run pytest tests/integration/ --ignore=tests/integration/eval --ignore=tests/integration/test_fetch_with_real_feed.py --ignore=tests/integration/test_metadata_agent_accuracy.py --ignore=tests/integration/test_metadata_search_agent_integration.py --ignore=tests/integration/test_rss_subscription.py --ignore=tests/integration/test_tmdb_dataset.py -v --tb=short"

  # ── Transmission (torrent lifecycle tests only) ────────────────────────────
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    volumes:
      - transmission-test-config:/config
      - ./docker/transmission/custom-cont-init.d:/custom-cont-init.d:ro
      - test-downloads:/downloads
      - test-watch:/watch
    environment:
      - PUID=1000
      - PGID=1000
      - PEERPORT=51413

volumes:
  transmission-test-config:
  test-downloads:
  test-watch:

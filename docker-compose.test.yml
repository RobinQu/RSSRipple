services:
  # RSSRipple application
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/test.db
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    depends_on:
      - test-server
    restart: unless-stopped

  # Integration test server (RSS feeds + tracker + torrent client)
  test-server:
    build:
      context: .
      dockerfile: tests/integration/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://test-server:8080
    restart: unless-stopped

  # Integration test runner
  test-runner:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/test.db
      - TEST_SERVER_URL=http://test-server:8080
      - RSSRIPPLE_URL=http://app:8000
    depends_on:
      - app
      - test-server
    command: >
      sh -c "sleep 10 && uv sync --frozen &&
             uv run pytest tests/integration/ -v --tb=short -x"

  # Optional: Transmission for comparison testing
  transmission:
    image: linuxserver/transmission:latest
    ports:
      - "9092:9091"
    volumes:
      - transmission-test-config:/config
      - test-downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000

volumes:
  transmission-test-config:
  test-downloads:

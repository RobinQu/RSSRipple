name: CI Fast Gate

on:
  push:
    branches:
      - 'feature/**'
      - 'feat/**'
      - 'bugfix/**'
      - 'fix/**'
      - 'chore/**'
      - 'ai/**'
      - 'copilot/**'
      - 'cursor/**'
      - 'claude/**'
      - 'codex/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - 'feature/**'
      - 'feat/**'
      - 'bugfix/**'
      - 'fix/**'
      - 'chore/**'
      - 'ai/**'
      - 'copilot/**'
      - 'cursor/**'
      - 'claude/**'
      - 'codex/**'
      - 'hotfix/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff
        run: uv run ruff check .

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run unit and API tests
        run: uv run pytest tests/unit tests/api -v --tb=short

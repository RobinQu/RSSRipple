# RSSRipple Resources & Metadata — Resource browsing, metadata search and linking
# Covers: view resources grouped by work, open resource detail, search metadata, link metadata,
# open metadata correction drawer.

web:
  url: ${RSSRIPPLE_URL:-http://localhost:5173}

agent:
  testId: resource-metadata
  groupName: RSSRipple E2E
  groupDescription: Resource browsing and metadata management flows

tasks:
  # ── Navigate to channel resources ───────────────────────────────
  - name: Navigate to channels and open a channel
    flow:
      - ai: Click "Channels" in the left sidebar
      - aiWaitFor: The channels list page loads with a table
        timeout: 10000

  - name: Open first available channel detail
    flow:
      - ai: Click on the first channel in the table to view its detail
      - aiWaitFor: The channel detail page loads with channel information
        timeout: 10000

  # ── View grouped resources ──────────────────────────────────────
  - name: View resources section
    flow:
      - ai: Scroll down to the resources section of the channel detail page
      - sleep: 2000

  - name: Verify resource groups are displayed
    flow:
      - aiAssert: Resources are displayed in collapsible groups — grouped by series, movie, or an "unidentified" group for unlinked resources

  - name: Expand a resource group
    flow:
      - ai: Click on a resource group header to expand it (look for a series group, movie group, or the unidentified group)
      - sleep: 2000
      - aiAssert: The group expands showing individual resource entries with titles and metadata fields

  # ── Open resource detail drawer ─────────────────────────────────
  - name: Open resource detail
    flow:
      - ai: Click on a resource entry within an expanded group to open its detail
      - aiWaitFor: A detail drawer or panel slides in from the right showing the resource's full information
        timeout: 10000

  - name: Verify resource detail content
    flow:
      - aiAssert: The resource detail shows fields like Title, Resolution, Video Codec, Audio Codec, Subtitle Group, Source, File Size, and a torrent/magnet link

  - name: Copy magnet link
    flow:
      - ai: Look for a "Copy" button next to the torrent/magnet link
      - ai: If present, click the copy button
      - sleep: 1000

  # ── Metadata search and link ────────────────────────────────────
  - name: Open metadata correction
    flow:
      - ai: Click the "Correct Metadata" or "Fix Metadata" or "Edit Metadata" button in the resource detail drawer
      - sleep: 2000
      - aiWaitFor: A metadata search panel or modal appears with fields for search title and content type (tv/movie)
        timeout: 10000

  - name: Search for TV series metadata
    flow:
      - aiInput: The search title input field
        value: Apology Line
      - sleep: 300
      - ai: Select "tv" as the content type if a selector is available
      - sleep: 300
      - ai: Click the "Search" button
      - sleep: 8000
      - aiAssert: Search results appear showing candidate TV series entries, or a message that no results were found

  - name: Select and confirm a metadata result if available
    flow:
      - ai: If search results are shown, click on one of the results to select it
      - sleep: 1000
      - ai: Click "Confirm" or "Link" to associate the selected metadata with the resource
      - sleep: 3000
      - aiAssert: The resource detail updates showing the linked metadata (series name, poster, etc.)

  # ── Close drawer and navigate ───────────────────────────────────
  - name: Close the resource detail drawer
    flow:
      - ai: Click the close button (X icon) on the resource detail drawer or click outside
      - sleep: 1000
      - aiAssert: The resource detail drawer is closed and the channel detail page is visible again

  # ── Unidentified resources ──────────────────────────────────────
  - name: Check unidentified resources group
    flow:
      - ai: Look for an "Unidentified" or "Unknown" resource group on the channel detail page
      - ai: If the group exists, expand it to see unlinked resources
      - sleep: 2000
      - aiAssert: The unidentified group contains resources that are not yet linked to any series or movie metadata
